<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 420" role="img" aria-labelledby="title desc">
  <title id="title">Ilustração de quiz interativo em grupo</title>
  <desc id="desc">Pergunta central, quatro alternativas coloridas e placar de participantes.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#201740"/><stop offset="1" stop-color="#090d1c"/></linearGradient>
  </defs>
  <rect width="640" height="420" rx="36" fill="url(#bg)"/>
  <circle cx="520" cy="45" r="130" fill="#8a55ff" opacity=".11"/>
  <rect x="67" y="54" width="506" height="100" rx="24" fill="#171d34" stroke="#51467a" stroke-width="2"/>
  <text x="320" y="91" fill="#95a5bd" font-family="Arial" font-size="16" text-anchor="middle">Qual decisão protege melhor o caixa?</text>
  <text x="320" y="126" fill="#f8fbff" font-family="Arial" font-size="25" font-weight="700" text-anchor="middle">Escolha antes do tempo acabar</text>
  <g font-family="Arial" font-size="20" font-weight="700" fill="#fff">
    <rect x="67" y="177" width="236" height="74" rx="18" fill="#e34c59"/><text x="185" y="222" text-anchor="middle">A · Investir tudo</text>
    <rect x="337" y="177" width="236" height="74" rx="18" fill="#2e86de"/><text x="455" y="222" text-anchor="middle">B · Preservar caixa</text>
    <rect x="67" y="270" width="236" height="74" rx="18" fill="#e4aa2f"/><text x="185" y="315" text-anchor="middle">C · Aumentar preço</text>
    <rect x="337" y="270" width="236" height="74" rx="18" fill="#43a75b"/><text x="455" y="315" text-anchor="middle">D · Adiar compra</text>
  </g>
  <g>
    <circle cx="116" cy="379" r="20" fill="#ffca69"/><circle cx="160" cy="379" r="20" fill="#6ec7ff"/><circle cx="204" cy="379" r="20" fill="#9f8cff"/>
    <text x="245" y="386" fill="#b7c4d8" font-family="Arial" font-size="17">participação + resposta imediata</text>
  </g>
</svg>
