<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 420" role="img" aria-labelledby="title desc">
  <title id="title">Ilustração de aprendizagem prática de código</title>
  <desc id="desc">Editor de código com desafio, execução e feedback lado a lado.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#111d39"/><stop offset="1" stop-color="#070e1b"/></linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#5bbcff"/><stop offset="1" stop-color="#7d7cff"/></linearGradient>
  </defs>
  <rect width="640" height="420" rx="36" fill="url(#bg)"/>
  <rect x="45" y="55" width="550" height="310" rx="24" fill="#091423" stroke="#30465f" stroke-width="2"/>
  <rect x="45" y="55" width="550" height="48" rx="24" fill="#12233a"/>
  <circle cx="77" cy="79" r="7" fill="#ff6f7d"/><circle cx="101" cy="79" r="7" fill="#f4c24f"/><circle cx="125" cy="79" r="7" fill="#62d89c"/>
  <rect x="75" y="130" width="292" height="202" rx="16" fill="#0d1a2b" stroke="#263c55"/>
  <g font-family="monospace" font-size="19">
    <text x="99" y="164" fill="#657f99">01</text><text x="137" y="164" fill="#9fe3ff">def</text><text x="174" y="164" fill="#f6f9fc"> calcular_preco</text><text x="327" y="164" fill="#f9c86b">()</text>
    <text x="99" y="201" fill="#657f99">02</text><text x="137" y="201" fill="#7d8fa6">  custo = 120</text>
    <text x="99" y="238" fill="#657f99">03</text><text x="137" y="238" fill="#7d8fa6">  margem = 0.35</text>
    <text x="99" y="275" fill="#657f99">04</text><text x="137" y="275" fill="#9fe3ff">  return</text><text x="219" y="275" fill="#f6f9fc"> custo * (1 + margem)</text>
  </g>
  <rect x="391" y="130" width="174" height="92" rx="16" fill="#10253d" stroke="#33506d"/>
  <text x="412" y="159" fill="#8ca4ba" font-family="Arial" font-size="15">Desafio</text>
  <text x="412" y="188" fill="#f4f8fd" font-family="Arial" font-size="20" font-weight="700">Defina o preço</text>
  <rect x="391" y="240" width="174" height="92" rx="16" fill="#102b2c" stroke="#3c7869"/>
  <circle cx="422" cy="286" r="17" fill="#52d59b"/>
  <path d="m414 286 6 6 12-14" fill="none" stroke="#07251b" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="451" y="279" fill="#8fc9b5" font-family="Arial" font-size="14">Resultado</text>
  <text x="451" y="305" fill="#eafff7" font-family="Arial" font-size="20" font-weight="700">Código correto</text>
  <rect x="217" y="346" width="208" height="28" rx="14" fill="#16273b"/>
  <rect x="217" y="346" width="146" height="28" rx="14" fill="url(#blue)"/>
</svg>
